---
- name: Add grafana repository key
  apt_key:
    url: https://packages.grafana.com/gpg.key
  become: yes

- name: Add grafana repository
  apt_repository:
    repo: deb https://packages.grafana.com/oss/deb stable main
  become: yes

- name: Install grafana
  apt:
    pkg: grafana
  become: yes

- name: Start the grafana service ad enabe autostart
  service:
    name: grafana-server
    state: restarted
    enabled: yes
  become: yes
