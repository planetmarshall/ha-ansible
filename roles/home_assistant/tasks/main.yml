- name: Install Home Assistant dependencies
  apt:
    pkg:
      - autoconf
      - build-essential
      - libffi-dev
      - libjpeg-dev
      - libopenjp2-7
      - libssl-dev
      - libtiff5
      - libturbojpeg0-dev
      - python3
      - python3-dev
      - python3-venv
      - python3-pip
      - tzdata
      - zlib1g-dev
      - vim
    install_recommends: no
  become: yes

- name: Add dialout group
  group:
    name: dialout

- name: Add gpio group
  group:
    name: gpio

- name: Add i2c group
  group:
    name: i2c

- name: Add homeassistant account
  user:
    name: homeassistant
    comment: Home Assistant user
    groups: dialout,gpio,i2c
    create_home: yes
    system: yes
    append: yes
  become: yes

- name: Install SSH Key for homeassistant account
  authorized_key:
    user: homeassistant
    state: present
    key: "{{ lookup('file', '/home/andrew/.ssh/id_ed25519.pub') }}"
  become_user: homeassistant
  become: yes

- name: Create directory for Home Assistant install
  file:
    path: /srv/homeassistant
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: '0755'
  become: yes

- name: Create working directory for home assistant
  file:
    path: /home/homeassistant/.homeassistant
    state: directory
    owner: homeassistant
    group: homeassistant
    mode: '0755'
  become: yes

- name: Install Home Assistant
  become: yes
  become_user: homeassistant
  pip:
    virtualenv: /srv/homeassistant
    virtualenv_command: python -m venv
    name:
      - wheel
      - homeassistant

- name: Add Home Assistant to Systemd
  template:
    src: home-assistant@homeassistant.service.j2
    dest: /etc/systemd/system/home-assistant@homeassistant.service
  notify: Reload systemd
  become: yes

- name: Enable and start Home Assistant
  service:
    name: home-assistant@homeassistant
    enabled: yes
    state: started
  become: yes

- name: Config Home Assistant
  blockinfile:
    path: /home/homeassistant/.homeassistant/configuration.yaml
    marker_begin: BEGIN_EMONPI
    marker_end: END_EMONPI
    block: |
      sensor:
      - platform: emoncms
        api_key: {{ emoncms_api_key }}
        url: {{ emoncms_url }}
        id: 1
  become_user: homeassistant
  become: yes
