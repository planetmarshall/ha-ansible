---
- name: Setup Home Assistant
  hosts: ha
  tasks:
    - name: Install SSH Keys
      authorized_key:
        user: pi
        state: present
        key: "{{ lookup('file', '/home/andrew/.ssh/id_ed25519.pub') }}"

    - name: Upgrade packages
      apt:
        update_cache: yes
        upgrade: yes
      become: yes

    - name: Install packages
      apt:
        pkg:
          - autoconf
          - build-essential
          - libffi-dev
          - libjpeg-dev
          - libopenjp2-7
          - libssl-dev
          - libtiff5
          - libturbojpeg0-dev
          - python3
          - python3-dev
          - python3-venv
          - python3-pip
          - tzdata
          - zlib1g-dev
          - vim
        install_recommends: no
      become: yes

    - name: Add homeassistant account
      user:
        name: homeassistant
        comment: Home Assistant user
        groups: dialout,gpio,i2c
        create_home: yes
        system: yes
        append: yes
      become: yes

    - name: Create homeassistant directory
      file:
        path: /srv/homeassistant
        state: directory
        owner: homeassistant
        group: homeassistant
        mode: '0755'
      become: yes

    - name: Install homeassistant
      become: yes
      become_user: homeassistant
      pip:
        virtualenv: /srv/homeassistant
        virtualenv_command: python -m venv
        name:
          - wheel
          - homeassistant
